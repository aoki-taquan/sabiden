[package]
name = "sabiden"
version = "0.1.0"
edition = "2021"
description = "NTT ひかり電話 SIP client - DIY implementation in Rust"
license = "MIT"

[[bin]]
name = "sabiden"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
md5 = "0.7"
rand = "0.8"
bytes = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
libc = "0.2"

[dev-dependencies]
tokio-test = "0.4"
