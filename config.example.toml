[sip]
# DHCP Option 120 で取得した SIP サーバアドレス
# - HGW 経由 (Digest 認証) なら NGN の IPv6 P-CSCF (例: [2001:A7FF:2101:6::F]:5060)
# - NGN 直収モード (Issue #37) なら init container が DHCPv4 で取得した IPv4
#   (例: 118.177.125.1:5060)
server_addr = "[2001:A7FF:2101:6::F]:5060"
# NGN UDP ソケットの bind アドレス (省略時 [::]:5060。K8s で IPv4 のみ使うなら 0.0.0.0:5060)
# bind_addr = "[::]:5060"
# この機器の NGN 側 IPv6 アドレス。
# 省略時は起動時に server_addr 宛のダミー UDP socket でカーネルが選ぶ source IP を
# 自動検出する (Issue #35)。K8s 等で pod IP が動的なら未指定推奨。
# 明示指定したい場合 (NAT 越しで外部 IP を載せたい等) のみ設定する。
# local_addr = "[2001:xxxx:xxxx::1]:5060"
# ひかり電話の電話番号
phone_number = "0312345678"
# NTT ドメイン
domain = "ntt-east.ne.jp"
# SIP 認証パスワード (HGW 設定画面から確認)。
# NGN 直収モード ([ngn] direct_mode = true) では回線認証ベースのため不要。
# その場合はコメントアウトするか、環境変数 SABIDEN_SIP_PASSWORD を空にする。
password = "your_sip_password"
# REGISTER 有効期限 (秒)
register_expires = 3600

# NGN 直収モード (Issue #37): HGW 不要で sabiden が NGN に直接 REGISTER
# する構成。home-ops PR #214 で確定したレシピ:
#   1. HGW を一度起動 → NTT OSS-DB に WAN MAC を永続登録 (初回のみ)
#   2. K8s NIC レベルで HGW WAN MAC を spoof
#   3. init container で DHCPv4 (vendor class "RX-600KI") → /30 IPv4 lease + option 120
#   4. sabiden が SIP REGISTER (Authorization なし、回線認証ベース) → 200 OK
# sabiden は (4) のみ担当。(1)-(3) は init container と K8s NIC 設定で実施。
# [ngn]
# direct_mode = true
# vendor_class = "RX-600KI"   # NTT 東日本 HGW 機種コード (init container DHCP で参照)

[health]
# ヘルスチェック HTTP サーバ
bind_addr = "0.0.0.0:8080"

# 内線 UAS (スマホ受付サーバ) 設定 (省略可)
# Linphone / Zoiper 等の SIP UA からの REGISTER を受け付ける
[uas]
bind_addr = "0.0.0.0:5061"
realm = "sabiden"
max_expires = 3600

# 内線アカウント (任意、複数可)
# [[extensions]]
# username = "iphone"
# password = "iphone_password"
#
# [[extensions]]
# username = "android"
# password = "android_password"

# WebRTC ゲートウェイ (Issue #28 — 実 ICE/DTLS-SRTP 終端)
# [webrtc]
# secret_hex = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
# register_ttl_secs = 300
# # メディア層: "stub" (テスト/開発用) または "str0m" (実 ICE/DTLS-SRTP)
# backend = "str0m"
# # 外部到達可能 IPv4 (ICE host candidate に載せる)
# public_ip = "203.0.113.1"
# # メディア用 UDP ポート範囲
# udp_port_range = "40000-40999"
# # 任意の TURN/STUN URL (本 PR では SDP 提示のみ、relay allocate は TODO)
# ice_servers = ["turn:turn.example.com:3478"]

# RTP ブリッジ用 bind IP (Issue #66)
# B2BUA media anchoring 用に NGN レッグと内線レッグの 2 つの UDP socket を
# bind する。各 socket をどの NIC で bind するかを個別指定する。
# - ngn_bind_ip: NGN 側 (eth1 NGN P-CSCF へ送出する IP)。
#   省略時は sip.local_addr (= eth1) にフォールバック。
# - ext_bind_ip: 内線側 (Linphone 等の内線 UA から到達可能な IP)。
#   省略時は ngn_bind_ip と同じ値にフォールバック (1 NIC 構成の場合)。
#   内線 UA が LAN (192.168.x.x 等) にいる本番構成では eth0 LAN IP を必ず指定する
#   (内線レッグ 200 OK SDP の c=/m= に載るので、ここが内線 UA から不達だと無音)。
# [bridge]
# ngn_bind_ip = "118.177.72.242"
# ext_bind_ip = "192.168.20.239"
