# sabiden Docker Compose 例
# 起動: docker compose -f deploy/docker/docker-compose.yml up -d
#
# host network mode を使う理由:
#   SIP / RTP は NAT 越えが極めて困難なため、コンテナを host のネットワーク
#   名前空間に直接置く。bridge / macvlan では 200 OK の Contact ヘッダや
#   SDP の c=IN が一致せず登録失敗する。

services:
  sabiden:
    # ローカルビルド: docker compose build
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: sabiden:local
    container_name: sabiden
    network_mode: host
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # 設定ファイル (read-only)
      - ../../config.toml:/etc/sabiden/config.toml:ro
      # DHCP hook が host 側で書く SIP サーバ情報 (read-only)
      - /run/sabiden:/run/sabiden:ro
    environment:
      # 環境変数で機密情報を注入する場合はこちら
      # ホスト側で `export SABIDEN_SIP_PASSWORD=...` するか
      # docker compose の env_file: を使う
      SABIDEN_LOG_LEVEL: ${SABIDEN_LOG_LEVEL:-info}
      SABIDEN_SIP_PASSWORD: ${SABIDEN_SIP_PASSWORD:-}
    # env_file:
    #   - ./.env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
