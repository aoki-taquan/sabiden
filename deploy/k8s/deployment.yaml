apiVersion: v1
kind: Namespace
metadata:
  name: sabiden
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sabiden-config
  namespace: sabiden
data:
  # 環境変数で上書きされうる値のデフォルト
  SABIDEN_SIP_DOMAIN: "ntt-east.ne.jp"
  SABIDEN_REGISTER_EXPIRES: "3600"
  SABIDEN_LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: sabiden-secrets
  namespace: sabiden
type: Opaque
stringData:
  # kubectl create secret generic sabiden-secrets \
  #   --from-literal=sip-password=xxx \
  #   --from-literal=phone-number=0312345678
  sip-password: "REPLACE_ME"
  phone-number: "REPLACE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabiden
  namespace: sabiden
spec:
  replicas: 1
  strategy:
    type: Recreate    # SIP 状態を持つので並行起動不可
  selector:
    matchLabels:
      app: sabiden
  template:
    metadata:
      labels:
        app: sabiden
    spec:
      hostNetwork: true   # SIP は NAT 越え困難なため
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: sabiden
          image: ghcr.io/aoki-taquan/sabiden:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: sabiden-config
          env:
            - name: SABIDEN_SIP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sabiden-secrets
                  key: sip-password
            - name: SABIDEN_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: sabiden-secrets
                  key: phone-number
          ports:
            - name: sip
              containerPort: 5060
              protocol: UDP
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
