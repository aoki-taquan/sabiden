# systemd-sysusers(8) 形式のユーザ定義
# /usr/lib/sysusers.d/sabiden.conf として配置すると次回起動時に sabiden ユーザが作成される
# 即時適用: sudo systemd-sysusers /usr/lib/sysusers.d/sabiden.conf
#
# Type Name     ID        GECOS                          Home directory  Shell
u      sabiden  -         "sabiden SIP client service"   -               /sbin/nologin
